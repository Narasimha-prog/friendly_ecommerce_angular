<div class="flex justify-center items-center py-12 px-4 bg-slate-50 min-h-screen">
  <div class="w-full max-w-2xl bg-white border border-slate-200 rounded-2xl shadow-sm p-8 md:p-10">
    
    <form [formGroup]="createForm" (ngSubmit)="create()" class="flex flex-col gap-8">
      
      <div class="border-b border-slate-100 pb-6">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create Product</h1>
        <p class="text-slate-500 mt-2">Fill in the details below to add a new item to your catalog.</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="flex flex-col gap-1.5 md:col-span-2">
          <label class="text-sm font-semibold text-slate-700 ml-1">Product Name</label>
          <input type="text" placeholder="e.g. Wireless Headphones" formControlName="name"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
            [class.border-red-500]="name.invalid && !name.untouched" />
          <div class="min-h-[20px] text-xs font-medium text-red-600 ml-1">
            <span *ngxControlError="name; track: 'required'">Name is required</span>
            <span *ngxControlError="name; track: 'minlength'">Minimum 3 characters</span>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1">Brand</label>
          <input type="text" placeholder="Brand Name" formControlName="brand"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            [class.border-red-500]="brand.invalid && !brand.untouched" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1">SKU</label>
          <input type="text" placeholder="Unique SKU" formControlName="sku"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            [class.border-red-500]="sku.invalid && !sku.untouched" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1">Price ($)</label>
          <input type="number" placeholder="0.00" formControlName="price"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            [class.border-red-500]="price.invalid && !price.untouched" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1">Product Color</label>
          <div class="flex items-center gap-3 h-[46px] px-3 border border-slate-300 rounded-lg">
            <input type="color" formControlName="color" class="w-8 h-8 rounded border-none cursor-pointer" />
            <span class="text-sm text-slate-500 font-mono">{{ createForm.get('color')?.value }}</span>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1">Category</label>
          <select formControlName="category" 
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none">
            <option value="" disabled selected>Select Category</option>
            @if(categoriesQuery.isSuccess()){
              @for(category of categoriesQuery.data(); track category.id){
                <option [value]="category.id + '+' + category.name">{{ category.name }}</option>
              }
            }
          </select>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1">Size</label>
          <select formControlName="size" 
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none">
            <option value="" disabled selected>Select Size</option>
            @for (size of sizes; track size) {
              <option [value]="size">{{ size }}</option>
            }
          </select>
        </div>

        <div class="flex flex-col gap-1.5 md:col-span-2">
          <label class="text-sm font-semibold text-slate-700 ml-1">Description</label>
          <textarea rows="4" placeholder="Describe the product details..." formControlName="description"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            [class.border-red-500]="description.invalid && !description.untouched"></textarea>
        </div>

        <div class="flex flex-col gap-1.5 md:col-span-2">
          <label class="text-sm font-semibold text-slate-700 ml-1">Product Images</label>
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg class="w-8 h-8 mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
              <p class="text-sm text-slate-500">Click to upload or drag and drop</p>
              <p class="text-xs text-slate-400">PNG, JPG (MAX. 800x400px)</p>
            </div>
            <input type="file" class="hidden" (change)="onUploadNewPicture($event.target)" formControlName="pictures" multiple [accept]="'.png,.jpg,.jpeg'" />
          </label>
        </div>

        <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-lg md:col-span-2">
          <input id="featured" type="checkbox" formControlName="featured" 
            class="w-5 h-5 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer">
          <label for="featured" class="text-sm font-bold text-slate-700 cursor-pointer">Make this a Featured Product</label>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-4 mt-4">
        <button type="submit" 
          class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex justify-center items-center gap-2"
          [disabled]="createForm.invalid || leading">
          @if(leading) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          }
          Create Product
        </button>
        <button type="button" routerLink="/admin/products" class="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-all">
          Cancel
        </button>
      </div>

    </form>
  </div>
</div>
