<div class="flex min-h-screen items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
  <div class="w-full max-w-md space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 tracking-tight">
        Welcome Back
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Please sign in to your account
      </p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4 rounded-md">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Email</label>
          <input id="email" formControlName="email" type="text" required
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-500 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
            placeholder="Enter your username">
          
          @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
            <p class="mt-1 text-xs text-red-500 italic">email is required.</p>
          }
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" formControlName="password" type="password" required
            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-500 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
            placeholder="••••••••">
          
          @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
            <p class="mt-1 text-xs text-red-500 italic">Password must be at least 6 characters.</p>
          }
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid"
          class="group relative flex w-full justify-center rounded-md border border-transparent bg-blue-600 py-2 px-4 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
          Sign in
        </button>
      </div>
    </form>
  </div>
</div>
