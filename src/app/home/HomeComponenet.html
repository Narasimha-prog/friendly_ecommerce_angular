<div class="relative min-h-[60vh] w-full overflow-hidden rounded-xl bg-gray-900 flex items-center">
  
  <div 
    class="absolute inset-0 z-0 bg-no-repeat bg-center bg-contain"
    style="background-image: url('./home/hero.jpg');">
  </div>

  <div class="absolute inset-0 z-10 bg-black/20"></div>

  <div class="relative z-20 w-full px-6 sm:px-8 lg:px-10">
    <div class="max-w-2xl text-left">
      <h1 class="mb-5 text-3xl font-bold text-white sm:text-5xl">
        Ecommerce Application
      </h1>
      <p class="mb-5 text-lg text-white sm:text-2xl">
        Check out our collection of products
      </p>
      <button 
        class="rounded-lg bg-blue-600 px-8 py-4 text-lg font-semibold text-white transition-colors hover:bg-blue-700 shadow-lg"
        routerLink="/shop/collection">
        Shop Collection
      </button>
    </div>
  </div>
</div>

<div class="my-10 w-full md:my-20">
  <h2 class="my-8 text-center text-2xl font-bold sm:my-12 sm:text-3xl">
    Featured products
  </h2>
  
  @defer (on immediate) {
    <app-featured-component></app-featured-component>
  } @placeholder {
    <div class="flex justify-center">
      <div class="h-8 w-8 animate-spin rounded-full border-4 border-blue-600 border-t-transparent"></div>
    </div>
  }
</div>
