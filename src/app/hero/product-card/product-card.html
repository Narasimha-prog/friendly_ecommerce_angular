<a class="group block bg-white rounded-xl shadow-md hover:shadow-2xl transition-all duration-300 overflow-hidden h-full border border-gray-100" 
   [routerLink]="['/products', product().id]">
  
  <div class="flex flex-col h-full">
    
    <figure class="relative aspect-square overflow-hidden bg-gray-50 flex justify-center items-center">
      <img [src]="product().imageUrls"
           alt="{{product().name}}"
           class="h-full w-full object-contain p-4 group-hover:scale-110 transition-transform duration-500" />
      
      <div class="absolute top-3 left-3">
        <span class="badge badge-secondary font-bold shadow-sm">NEW</span>
      </div>
    </figure>

    <div class="p-4 flex flex-col flex-grow">
      <div class="mb-auto">
        <span class="text-xs font-semibold uppercase tracking-wider text-primary/70">
          {{product().brand}}
        </span>
        <h2 class="text-gray-800 font-bold text-md mt-1 line-clamp-2 min-h-[3rem]">
          {{product().name}} 
          <span class="text-gray-400 font-normal">| {{product().productSize}}</span>
        </h2>
      </div>

      <div class="mt-4 flex items-center gap-2">
        <span class="text-xl font-extrabold text-gray-900">
          {{product().price | currency : 'INR'}}
        </span>
        <span class="text-sm line-through text-gray-400">
           {{ (product().price) | currency :'INR'}} 
        </span>
      </div>
      
      <div class="mt-3 text-primary text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">
        View Details <span>&rarr;</span>
      </div>
    </div>
  </div>
</a>
